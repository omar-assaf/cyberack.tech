title: CybeRack
email: your-email@example.com
description: >-
  CybeRack - cybersecurity, automation, cloud, scripting, and infrastructure projects.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://cyberack.tech" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: omar_assaf
github_username:  omar-assaf

# Build settings
markdown: kramdown
theme: minima # We are not using this but jekyll might complain if missing
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate-v2

# Exclude from processing.
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - package.json
  - package-lock.json
  - tailwind.config.js
  - postcss.config.js
  - .github/
  - scripts/
  - .editorconfig
  - .markdownlint.json
  - .markdownlintignore
  - commitlint.config.js
  - .husky/

# Pagination Settings
pagination:
  enabled: true
  per_page: 10
  permalink: '/page/:num/'
  title: ':title - Page :num'
  limit: 0
  sort_field: 'date'
  sort_reverse: true
  trail:
    before: 2
    after: 2