<header class="w-full bg-apple-bg/80 backdrop-blur-md border-b border-gray-200 sticky top-0 z-40">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-14">
      <!-- Logo -->
      <div class="flex-shrink-0">
        <a href="{{ '/' | relative_url }}" class="flex items-center gap-2">
          <img class="h-8 w-8 rounded-md" src="{{ '/favicon/favicon-96x96.png' | relative_url }}" alt="CybeRack Logo">
          <span class="font-semibold text-lg tracking-tight text-apple-textPrimary">{{ site.title }}</span>
        </a>
      </div>
      
      <!-- Navigation -->
      <nav class="hidden md:block">
        <ul class="flex space-x-8">
          {% for item in site.data.navigation.main %}
          <li>
            <a href="{{ item.url | relative_url }}" class="text-sm font-medium text-apple-textPrimary hover:text-apple-link transition-colors">
              {{ item.title }}
            </a>
          </li>
          {% endfor %}
        </ul>
      </nav>

      <!-- Mobile menu button (Simplified for now) -->
      <div class="md:hidden flex items-center">
        <button type="button" class="text-apple-textPrimary hover:text-apple-link focus:outline-none" aria-label="Menu">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</header>
