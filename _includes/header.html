<header class="w-full bg-framer-bg/80 backdrop-blur-lg border-b border-framer-border sticky top-0 z-40 transition-all duration-300">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <div class="flex-shrink-0">
        <a href="{{ '/' | relative_url }}" class="flex items-center gap-3 group">
          <img class="h-8 w-8 rounded-lg shadow-[0_0_15px_rgba(0,153,255,0.3)] transition-shadow duration-300 group-hover:shadow-[0_0_20px_rgba(0,153,255,0.6)]" src="{{ '/favicon/favicon-96x96.png' | relative_url }}" alt="CybeRack Logo">
          <span class="font-bold text-xl tracking-tight text-framer-textPrimary group-hover:text-framer-accent transition-colors">{{ site.title }}</span>
        </a>
      </div>
      
      <!-- Navigation -->
      <nav class="hidden md:block">
        <ul class="flex space-x-1">
          {% for item in site.data.navigation.main %}
          <li>
            <a href="{{ item.url | relative_url }}" class="text-sm font-semibold text-framer-textSecondary hover:text-framer-textPrimary px-4 py-2 rounded-full hover:bg-framer-card transition-all duration-200">
              {{ item.title }}
            </a>
          </li>
          {% endfor %}
        </ul>
      </nav>

      <!-- Mobile menu button -->
      <div class="md:hidden flex items-center">
        <button type="button" class="text-framer-textSecondary hover:text-framer-textPrimary focus:outline-none p-2 rounded-md hover:bg-framer-card transition-colors" aria-label="Menu">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</header>
