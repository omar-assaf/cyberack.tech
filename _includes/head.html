<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{% if page.robots %}
<meta name="robots" content="{{ page.robots }}">
{% else %}
<meta name="robots" content="index,follow">
{% endif %}
<title>{% if page.title %}{{ page.title | escape }} | {{ site.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>

<meta name="description" content="{% if page.description %}{{ page.description | escape }}{% else %}{{ site.description | escape }}{% endif %}">
<link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">

<!-- CSP Setup -->
{% assign build_nonce = site.time | date: "%s" %}
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'nonce-{{ build_nonce }}' https://plausible.io https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://plausible.io https://www.google-analytics.com https://analytics.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">

<meta name="referrer" content="strict-origin-when-cross-origin">

<!-- Favicons -->
<link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
<link rel="shortcut icon" href="/favicon/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="CybeRack" />
<link rel="manifest" href="/favicon/site.webmanifest" />

<!-- CSS -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<!-- SEO Tags (Jekyll SEO Tag Plugin) -->
{% seo title=false %}

<!-- Analytics -->
{% include analytics.html nonce=build_nonce %}
